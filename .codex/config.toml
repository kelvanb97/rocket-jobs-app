[sandbox_workspace_write]
network_access = true

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@0.0.68", "--browser", "chrome", "--user-data-dir", "./data/chrome-profile"]
startup_timeout_sec = 20
tool_timeout_sec = 120

